staleness_drift_rules:
  window:
    lookback_days: 28
    bucket_days: 7
  thresholds:
    metrics:
      freshness_hours:
        comparator: gt
        hard_fail: 168
        soft_warn: 72
      update_lag_hours_avg:
        comparator: gt
        hard_fail: 336
        soft_warn: 192
      coverage_ratio_28d:
        comparator: lt
        hard_fail: 0.5
        soft_warn: 0.75
      temporal_psi:
        comparator: gt
        hard_fail: 0.25
        soft_warn: 0.1
  actions:
    freshness_hours: trigger stale-data alert and refresh source ingestion
    update_lag_hours_avg: inspect source update cadence and batch scheduling
    coverage_ratio_28d: backfill missing time buckets before publication
    temporal_psi: trigger deeper drift validation and sample changed documents
